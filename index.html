<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Ads Operation Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white font-mono p-10">
    <div class="max-w-xl mx-auto space-y-6">
        
        <!-- GİRİŞ BÖLÜMÜ -->
        <div class="border-2 border-yellow-600 p-6 rounded bg-slate-900">
            <h2 class="text-xl font-bold mb-4 text-yellow-500">TELEGRAM GİRİŞ</h2>
            <div id="phoneSection" class="space-y-4">
                <input id="phone" type="text" placeholder="+905XXXXXXXXX" class="w-full bg-black p-2 border border-yellow-900 focus:outline-none">
                <button onclick="sendCode()" class="w-full bg-yellow-600 p-2 font-bold">KOD GÖNDER</button>
            </div>
            <div id="codeSection" class="hidden mt-4 space-y-4">
                <input id="code" type="text" placeholder="Gelen Kodu Yaz" class="w-full bg-black p-2 border border-yellow-900 focus:outline-none">
                <button onclick="verifyCode()" class="w-full bg-yellow-500 text-black p-2 font-bold">GİRİŞİ TAMAMLA</button>
            </div>
            <p id="authStatus" class="mt-2 text-xs text-gray-400"></p>
        </div>

        <!-- OPERASYON BÖLÜMÜ -->
        <div class="border-2 border-blue-500 p-6 rounded bg-slate-900">
            <h2 class="text-xl font-bold mb-4 text-blue-400">OPERASYON</h2>
            <button onclick="startOp()" class="w-full bg-blue-600 p-4 font-black rounded italic">START "AD TODAY" OPERATION</button>
            <div id="opStatus" class="mt-4 text-center text-blue-300"></div>
        </div>

    </div>

    <script>
        async function sendCode() {
            const phone = document.getElementById('phone').value;
            const res = await fetch('/send-code', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({phone})
            });
            const data = await res.json();
            if(data.status === "success") {
                document.getElementById('phoneSection').classList.add('hidden');
                document.getElementById('codeSection').classList.remove('hidden');
                document.getElementById('authStatus').innerText = "Kod gönderildi, lütfen kutucuğa yazın.";
            } else {
                alert(data.message);
            }
        }

        async function verifyCode() {
            const code = document.getElementById('code').value;
            const res = await fetch('/verify-login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({code})
            });
            const data = await res.json();
            if(data.status === "success") {
                document.getElementById('codeSection').classList.add('hidden');
                document.getElementById('authStatus').innerText = "Giriş Başarılı! İşlem Yapabilirsiniz.";
                document.getElementById('authStatus').classList.replace('text-gray-400', 'text-green-400');
            } else {
                alert(data.message);
            }
        }

        async function startOp() {
            const res = await fetch('/start-ads-now', {method: 'POST'});
            const data = await res.json();
            document.getElementById('opStatus').innerText = data.message;
        }
    </script>
</body>
</html>
