<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>S4S Autonomous Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .terminal { background: #020617; height: 350px; overflow-y: auto; font-family: monospace; border: 1px solid #1e293b; color: #10b981; }
        .log-line { padding: 4px 12px; border-bottom: 1px solid #0f172a; font-size: 12px; }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 p-6">
    <div class="max-w-4xl mx-auto space-y-6">
        
        <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800 flex justify-between items-center shadow-2xl">
            <div>
                <h1 class="text-3xl font-black text-blue-500 italic uppercase">CloudAds AI</h1>
                <p id="auth" class="text-xs font-bold text-red-500 italic">DURUM: KONTROL EDİLİYOR</p>
            </div>
            <button onclick="toggle()" id="btn" class="bg-blue-600 px-8 py-3 rounded-xl font-bold hover:bg-blue-500 transition-all">SİSTEMİ BAŞLAT</button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800 space-y-4">
                <h2 class="text-sm font-bold text-slate-500 uppercase tracking-widest">Kanal Ayarın</h2>
                <input id="l" type="text" placeholder="Reklam Linkin" class="w-full bg-slate-950 border border-slate-800 p-3 rounded-xl text-sm outline-none">
                <button onclick="save()" class="w-full bg-blue-600 py-3 rounded-xl font-bold">KAYDET</button>
                <div class="text-[10px] text-slate-500 mt-2">
                    *Linkler otomatik olarak @cloudads1 kanalına gider.
                </div>
            </div>

            <div class="md:col-span-2 space-y-2">
                <h2 class="text-sm font-bold text-slate-500 uppercase tracking-widest">Canlı İşlem Akışı</h2>
                <div id="logs" class="terminal rounded-2xl"></div>
            </div>
        </div>
    </div>

    <script>
        async function refresh() {
            try {
                const res = await fetch('/get-data');
                const data = await res.json();
                
                document.getElementById('logs').innerHTML = data.logs.map(l => `<div class="log-line">${l}</div>`).join('');
                document.getElementById('logs').scrollTop = document.getElementById('logs').scrollHeight;

                const auth = document.getElementById('auth');
                if(data.is_auth) {
                    auth.innerText = "SİSTEM BAĞLI (OTURUM OK)";
                    auth.className = "text-xs font-bold text-green-500 italic";
                } else {
                    auth.innerText = "OTURUM YOK! GİRİŞ GEREKLİ";
                    auth.className = "text-xs font-bold text-red-500 italic";
                }

                const btn = document.getElementById('btn');
                if(data.is_auto) {
                    btn.innerText = "OTOMATİK PİLOTU DURDUR";
                    btn.className = "bg-green-600 px-8 py-3 rounded-xl font-bold animate-pulse";
                } else {
                    btn.innerText = "OTOMATİK PİLOTU BAŞLAT";
                    btn.className = "bg-blue-600 px-8 py-3 rounded-xl font-bold hover:bg-blue-500";
                }
            } catch (e) {}
        }
        setInterval(refresh, 2000);

        async function toggle() { await fetch('/toggle', {method: 'POST'}); }
        async function save() {
            const link = document.getElementById('l').value;
            await fetch('/update', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({link})
            });
            alert("Reklam linkin kaydedildi.");
        }
    </script>
</body>
</html>
