<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>S4S Intelligence Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-200 p-6 md:p-12 font-mono">
    <div class="max-w-2xl mx-auto space-y-8">
        <div class="border-b border-slate-800 pb-4">
            <h1 class="text-3xl font-black text-blue-500">S4S BOT v3.0</h1>
            <p class="text-slate-500 text-sm italic">Tracking: vouchs, vouch, ads, dragon, proof</p>
        </div>

        <div class="bg-slate-900 p-6 rounded-lg border border-slate-800 space-y-6 shadow-2xl">
            <h2 class="text-xl font-bold text-blue-400">Bot Ayarları</h2>
            
            <div class="space-y-4">
                <div>
                    <label class="text-xs text-slate-500 font-bold uppercase">Reklam Linkin</label>
                    <input id="my_link" type="text" placeholder="https://t.me/kanalim" class="w-full bg-slate-950 border border-slate-700 p-3 rounded mt-1 focus:border-blue-500 outline-none">
                </div>
                <div>
                    <label class="text-xs text-slate-500 font-bold uppercase">Kayıt Kanalın</label>
                    <input id="storage" type="text" placeholder="@kayit_kanali" class="w-full bg-slate-950 border border-slate-700 p-3 rounded mt-1 focus:border-blue-500 outline-none">
                </div>
                <div>
                    <label class="text-xs text-slate-500 font-bold uppercase">Filtre Kelimeleri (Virgülle ayır)</label>
                    <input id="keywords" type="text" value="vouchs, vouch, ads, dragon, proof" class="w-full bg-slate-950 border border-slate-700 p-3 rounded mt-1 focus:border-blue-500 outline-none">
                </div>
                <button onclick="save()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-3 rounded transition">AYARLARI UYGULA</button>
            </div>
        </div>

        <div class="bg-slate-900 p-6 rounded-lg border border-slate-800">
            <h2 class="text-xl font-bold text-yellow-500 mb-4 italic text-center">Operasyon</h2>
            <button onclick="startOp()" class="w-full border-2 border-yellow-600 p-4 font-black hover:bg-yellow-600 hover:text-black transition uppercase tracking-widest">
                İsminde kelime geçen herkese mesaj at
            </button>
            <p id="status" class="mt-4 text-center text-xs text-slate-500">Bot 7/24 aktif, gelen mesajları ve isimleri tarıyor...</p>
        </div>
    </div>

    <script>
        async function save() {
            const data = {
                my_link: document.getElementById('my_link').value,
                storage: document.getElementById('storage').value,
                keywords: document.getElementById('keywords').value
            };
            const res = await fetch('/update-settings', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            const result = await res.json();
            alert(result.message);
        }

        async function startOp() {
            document.getElementById('status').innerText = "Tarama ve toplu mesaj başlatıldı...";
            await fetch('/start-ads-now', {method: 'POST'});
        }
    </script>
</body>
</html>
