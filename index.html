<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>S4S Ultimate Matrix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .terminal { background: #020617; height: 300px; overflow-y: auto; font-family: monospace; border: 1px solid #1e293b; color: #10b981; }
        .log-line { padding: 4px 12px; border-bottom: 1px solid #0f172a; font-size: 11px; }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 p-4 font-sans">
    <div class="max-w-4xl mx-auto space-y-6">
        
        <!-- ÜST PANEL VE GİRİŞ -->
        <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800 shadow-2xl space-y-4">
            <div class="flex justify-between items-center">
                <h1 class="text-2xl font-black text-blue-500 italic underline">S4S ULTIMATE</h1>
                <div id="authStatus" class="text-xs font-bold px-3 py-1 rounded-full">YÜKLENİYOR...</div>
            </div>

            <!-- GİRİŞ FORMU -->
            <div id="loginForm" class="hidden border-2 border-yellow-600/30 p-4 rounded-xl space-y-3 bg-black/20">
                <h2 class="text-yellow-500 text-sm font-bold italic">🔐 Telegram Girişi Gerekli:</h2>
                <div id="step-phone" class="flex gap-2">
                    <input id="phone" type="text" placeholder="+905..." class="flex-1 bg-slate-950 border border-slate-800 p-2 rounded-lg text-sm">
                    <button onclick="sendCode()" class="bg-yellow-600 px-4 py-2 rounded-lg text-black font-bold text-xs">Kod Gönder</button>
                </div>
                <div id="step-code" class="hidden flex gap-2">
                    <input id="code" type="text" placeholder="SMS Kodu" class="flex-1 bg-slate-950 border border-slate-800 p-2 rounded-lg text-sm">
                    <button onclick="verifyCode()" class="bg-yellow-500 px-4 py-2 rounded-lg text-black font-bold text-xs">Onayla</button>
                </div>
                <div id="step-2fa" class="hidden flex gap-2">
                    <input id="pass" type="password" placeholder="2FA Şifresi" class="flex-1 bg-slate-950 border border-slate-800 p-2 rounded-lg text-sm">
                    <button onclick="verify2fa()" class="bg-red-600 px-4 py-2 rounded-lg font-bold text-xs">Giriş</button>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800 space-y-4">
                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase">Reklam Linkin</label>
                    <input id="lInput" type="text" class="w-full bg-black border border-slate-700 p-2 mt-1 rounded-lg text-xs outline-none">
                </div>
                <button onclick="saveLink()" class="w-full bg-blue-600 py-2 rounded-xl font-bold text-xs">KAYDET</button>
                <div class="pt-4">
                    <button onclick="startManual()" class="w-full bg-emerald-600 py-4 rounded-xl font-black text-white text-xs">TOPLU MESAJ AT (.ads)</button>
                </div>
            </div>

            <div class="md:col-span-2 space-y-2">
                <h3 class="text-xs font-bold text-slate-500 uppercase tracking-widest">Canlı Terminal</h3>
                <div id="logs" class="terminal rounded-2xl shadow-inner"></div>
            </div>
        </div>
    </div>

    <script>
        async function refresh() {
            try {
                const res = await fetch('/status');
                const data = await res.json();
                
                document.getElementById('logs').innerHTML = data.logs.map(l => `<div class="log-line">${l}</div>`).join('');
                document.getElementById('logs').scrollTop = document.getElementById('logs').scrollHeight;

                const auth = document.getElementById('authStatus');
                const form = document.getElementById('loginForm');
                
                if(data.is_auth) {
                    auth.innerText = "SİSTEM BAĞLI";
                    auth.className = "text-xs font-bold px-3 py-1 rounded-full bg-green-900/20 text-green-500";
                    form.classList.add('hidden');
                } else {
                    auth.innerText = "GİRİŞ GEREKLİ";
                    auth.className = "text-xs font-bold px-3 py-1 rounded-full bg-red-900/20 text-red-500";
                    form.classList.remove('hidden');
                }
                if(!document.getElementById('lInput').value) document.getElementById('lInput').value = data.my_link;
            } catch(e) {}
        }
        setInterval(refresh, 2000);

        async function sendCode() {
            const phone = document.getElementById('phone').value;
            const res = await fetch('/login/send-code', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone})});
            const d = await res.json();
            if(d.status==='success') { document.getElementById('step-phone').classList.add('hidden'); document.getElementById('step-code').classList.remove('hidden'); }
            else alert(d.message);
        }

        async function verifyCode() {
            const code = document.getElementById('code').value;
            const res = await fetch('/login/verify-code', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({code})});
            const d = await res.json();
            if(d.status==='success') location.reload();
            else if(d.status==='2fa_required') { document.getElementById('step-code').classList.add('hidden'); document.getElementById('step-2fa').classList.remove('hidden'); }
            else alert(d.message);
        }

        async function verify2fa() {
            const password = document.getElementById('pass').value;
            const res = await fetch('/login/verify-2fa', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({password})});
            const d = await res.json();
            if(d.status==='success') location.reload(); else alert(d.message);
        }

        async function saveLink() {
            const link = document.getElementById('lInput').value;
            await fetch('/update-link', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({link})});
            alert("Kaydedildi!");
        }

        async function startManual() { if(confirm("Emin misin?")) fetch('/manual-ads', {method:'POST'}); }
    </script>
</body>
</html>
