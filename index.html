<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>S4S Matrix Hybrid</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .terminal { background: #020617; height: 350px; overflow-y: auto; font-family: monospace; border: 1px solid #1e293b; color: #10b981; }
        .log-line { padding: 4px 12px; border-bottom: 1px solid #0f172a; font-size: 11px; }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 p-4 font-sans">
    <div class="max-w-4xl mx-auto space-y-6">
        
        <!-- Üst Bar -->
        <div class="flex justify-between items-center bg-slate-900 p-6 rounded-2xl border border-slate-800 shadow-2xl">
            <div>
                <h1 class="text-2xl font-black text-blue-500 italic tracking-tighter">S4S HYBRID SYSTEM</h1>
                <p id="auth" class="text-[10px] font-bold text-red-500">KONTROL EDİLİYOR...</p>
            </div>
            <div class="text-right">
                <p id="userCount" class="text-xs text-slate-500 font-bold">0 KİŞİ KAYITLI</p>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <!-- Sol: Kontrol -->
            <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800 space-y-4">
                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase">Reklam Linkin</label>
                    <input id="linkInput" type="text" class="w-full bg-black border border-slate-700 p-2 mt-1 rounded-lg text-sm outline-none">
                </div>
                <button onclick="saveLink()" class="w-full bg-blue-600 py-2 rounded-xl font-bold hover:bg-blue-500 transition-all">LİNKİ GÜNCELLE</button>
                
                <div class="pt-4 border-t border-slate-800">
                    <button onclick="startManualAds()" class="w-full bg-emerald-600 py-4 rounded-xl font-black text-white hover:bg-emerald-500 shadow-lg shadow-emerald-900/20">
                        LİSTEYE TOPLU MESAJ AT
                    </button>
                    <p class="text-[9px] text-center text-slate-600 mt-2 italic">Not: 6 saniye arayla gönderir.</p>
                </div>
            </div>

            <!-- Sağ: Terminal -->
            <div class="md:col-span-2 space-y-2">
                <h2 class="text-xs font-bold text-slate-500 uppercase tracking-widest">Canlı İşlem Terminali</h2>
                <div id="logs" class="terminal rounded-2xl shadow-inner"></div>
            </div>
        </div>
    </div>

    <script>
        async function refresh() {
            try {
                const res = await fetch('/status');
                const data = await res.json();
                
                document.getElementById('logs').innerHTML = data.logs.map(l => `<div class="log-line">${l}</div>`).join('');
                document.getElementById('logs').scrollTop = document.getElementById('logs').scrollHeight;
                
                document.getElementById('auth').innerText = data.is_auth ? "SİSTEM BAĞLI" : "GİRİŞ GEREKLİ!";
                document.getElementById('auth').className = data.is_auth ? "text-[10px] font-bold text-green-500" : "text-[10px] font-bold text-red-500";
                
                document.getElementById('userCount').innerText = data.count + " KİŞİ KAYITLI";
                if(!document.getElementById('linkInput').value) document.getElementById('linkInput').value = data.my_link;
            } catch(e) {}
        }
        setInterval(refresh, 2000);

        async function saveLink() {
            const link = document.getElementById('linkInput').value;
            await fetch('/update-link', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({link})});
            alert("Link kaydedildi.");
        }

        async function startManualAds() {
            if(confirm("Listedeki herkese mesaj gönderilsin mi?")) {
                await fetch('/manual-ads', {method:'POST'});
            }
        }
    </script>
</body>
</html>
