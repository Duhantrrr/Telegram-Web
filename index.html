<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>CloudAds S4S Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .terminal { background: #050505; height: 400px; overflow-y: auto; font-family: 'Courier New', monospace; border: 1px solid #222; }
        .log-line { padding: 4px 10px; border-bottom: 1px solid #111; font-size: 12px; color: #00ff41; text-shadow: 0 0 5px #00ff41; }
    </style>
</head>
<body class="bg-black text-slate-300 p-4">
    <div class="max-w-4xl mx-auto space-y-6">
        
        <div class="bg-zinc-900 p-6 rounded-2xl border border-zinc-800 flex justify-between items-center shadow-2xl">
            <div>
                <h1 class="text-3xl font-black text-blue-500 tracking-tighter italic">S4S PRO-BOT</h1>
                <p id="auth" class="text-[10px] font-bold text-red-600">DURUM: KONTROL EDİLİYOR...</p>
            </div>
            <button onclick="toggle()" id="btn" class="bg-blue-600 px-8 py-3 rounded-xl font-black transition-all hover:bg-blue-500">OTOMATİK PİLOTU BAŞLAT</button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-zinc-900 p-6 rounded-2xl border border-zinc-800 space-y-4 shadow-xl">
                <h2 class="text-xs font-bold text-zinc-500 uppercase tracking-widest">Senin Reklam Linkin</h2>
                <input id="l" type="text" placeholder="https://t.me/kanalim" class="w-full bg-black border border-zinc-700 p-3 rounded-xl text-sm outline-none focus:border-blue-600">
                <button onclick="save()" class="w-full bg-white text-black py-3 rounded-xl font-extrabold hover:bg-zinc-200">KAYDET</button>
                <p class="text-[9px] text-zinc-600 italic">Linkler @cloudads1 kanalına yönlendirilir.</p>
            </div>

            <div class="md:col-span-2 space-y-2">
                <h2 class="text-xs font-bold text-zinc-500 uppercase tracking-widest">Canlı İşlem Terminali</h2>
                <div id="logs" class="terminal rounded-2xl shadow-inner"></div>
            </div>
        </div>
    </div>

    <script>
        async function refresh() {
            try {
                const res = await fetch('/get-data');
                const data = await res.json();
                
                document.getElementById('logs').innerHTML = data.logs.map(l => `<div class="log-line">${l}</div>`).join('');
                document.getElementById('logs').scrollTop = document.getElementById('logs').scrollHeight;

                const auth = document.getElementById('auth');
                if(data.is_auth) {
                    auth.innerText = "TELEGRAM BAĞLI";
                    auth.className = "text-[10px] font-bold text-green-500";
                } else {
                    auth.innerText = "GİRİŞ GEREKLİ!";
                    auth.className = "text-[10px] font-bold text-red-500";
                }

                const btn = document.getElementById('btn');
                if(data.is_auto) {
                    btn.innerText = "PİLOTU DURDUR";
                    btn.className = "bg-green-600 px-8 py-3 rounded-xl font-black animate-pulse text-white";
                } else {
                    btn.innerText = "OTOMATİK PİLOTU BAŞLAT";
                    btn.className = "bg-blue-600 px-8 py-3 rounded-xl font-black text-white";
                }
            } catch(e) {}
        }
        setInterval(refresh, 2000);

        async function toggle() { await fetch('/toggle', {method: 'POST'}); }
        async function save() {
            const link = document.getElementById('l').value;
            await fetch('/update', {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({link})});
            alert("Reklam linkin güncellendi!");
        }
    </script>
</body>
</html>
