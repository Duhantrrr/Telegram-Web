<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>S4S Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .terminal { background: #050505; border: 1px solid #1e293b; font-family: 'Courier New', monospace; height: 300px; overflow-y: auto; }
        .log-line { border-bottom: 1px solid #111; padding: 4px 8px; color: #10b981; font-size: 13px; }
        .log-time { color: #64748b; margin-right: 8px; }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 p-4 md:p-10">
    <div class="max-w-5xl mx-auto space-y-6">
        
        <div class="flex justify-between items-center border-b border-slate-800 pb-4">
            <h1 class="text-3xl font-black text-blue-500 tracking-tighter">S4S INTELLIGENCE</h1>
            <div id="authStatus" class="text-xs font-bold px-3 py-1 rounded bg-red-900/30 text-red-500">KONTROL EDİLİYOR...</div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- Sol: Ayarlar -->
            <div class="lg:col-span-1 bg-slate-900 p-6 rounded-xl border border-slate-800 space-y-4">
                <h2 class="font-bold text-lg text-slate-400">AYARLAR</h2>
                <div>
                    <label class="text-[10px] text-slate-500 font-bold">REKLAM LİNKİN</label>
                    <input id="my_link" type="text" placeholder="https://t.me/..." class="w-full bg-slate-950 border border-slate-700 p-2 rounded text-sm focus:border-blue-500 outline-none">
                </div>
                <div>
                    <label class="text-[10px] text-slate-500 font-bold">KAYIT KANALI</label>
                    <input id="storage" type="text" placeholder="@..." class="w-full bg-slate-950 border border-slate-700 p-2 rounded text-sm focus:border-blue-500 outline-none">
                </div>
                <div>
                    <label class="text-[10px] text-slate-500 font-bold">FİLTRELER (Virgülle ayır)</label>
                    <input id="keywords" type="text" value="vouchs, vouch, ads, dragon, proof" class="w-full bg-slate-950 border border-slate-700 p-2 rounded text-sm focus:border-blue-500 outline-none">
                </div>
                <button onclick="updateSettings()" class="w-full bg-blue-600 hover:bg-blue-700 py-2 rounded font-bold transition text-sm">GÜNCELLE</button>
            </div>

            <!-- Sağ: Canlı Konsol -->
            <div class="lg:col-span-2 space-y-4">
                <h2 class="font-bold text-lg text-slate-400">CANLI TERMİNAL</h2>
                <div id="terminal" class="terminal rounded-xl p-2 shadow-2xl">
                    <div class="log-line text-slate-500 italic">Sistem logları bekleniyor...</div>
                </div>
                <div class="flex gap-4">
                    <button onclick="startBroadcast()" class="flex-1 bg-amber-600 hover:bg-amber-700 py-3 rounded-lg font-black text-sm tracking-widest uppercase">Eski Mesajları Tara</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Logları her 2 saniyede bir çek
        async function fetchLogs() {
            try {
                const res = await fetch('/get-logs');
                const data = await res.json();
                
                // Auth Durumu
                const authEl = document.getElementById('authStatus');
                if(data.is_auth) {
                    authEl.innerText = "TELEGRAM BAĞLI";
                    authEl.className = "text-xs font-bold px-3 py-1 rounded bg-green-900/30 text-green-500";
                } else {
                    authEl.innerText = "GİRİŞ GEREKLİ";
                    authEl.className = "text-xs font-bold px-3 py-1 rounded bg-red-900/30 text-red-500";
                }

                // Logları Yazdır
                const term = document.getElementById('terminal');
                term.innerHTML = data.logs.map(log => {
                    return `<div class="log-line">${log}</div>`;
                }).join('');
                term.scrollTop = term.scrollHeight;
            } catch(e) {}
        }

        setInterval(fetchLogs, 2000);

        async function updateSettings() {
            const data = {
                my_link: document.getElementById('my_link').value,
                storage: document.getElementById('storage').value,
                keywords: document.getElementById('keywords').value
            };
            await fetch('/update-settings', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
        }

        async function startBroadcast() {
            await fetch('/start-ads-now', {method: 'POST'});
        }
    </script>
</body>
</html>
